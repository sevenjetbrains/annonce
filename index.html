<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petites Annonces</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- En-tête -->
  <header class="site-header">
    <div class="wrap">
      <span class="logo">
        <span class="logo-mark">◆</span> Petites Annonces
      </span>
      <span class="counter" id="counter">0 annonce</span>
	  <span class="counter" id="counter">0 annonce</span>
    </div>
  </header>

  <main class="wrap layout">
    <!-- Colonne formulaire -->
    <section class="panel" aria-label="Publier une annonce">
      <h1 class="panel-title">Publier une annonce</h1>
      <p class="panel-sub">Remplis les champs, ton annonce apparaît à droite.</p>

      <!-- On n'utilise pas d'attribut action : tout est géré en JS -->
      <form id="annonce-form" class="form" novalidate>
        <div class="field">
          <label for="titre">Titre</label>
          <input type="text" id="titre" name="titre" placeholder="Vélo de ville en bon état" required />
        </div>

        <div class="row">
          <div class="field">
            <label for="prix">Prix (€)</label>
            <input type="number" id="prix" name="prix" min="0" step="1" placeholder="120" required />
          </div>
          <div class="field">
            <label for="categorie">Catégorie</label>
            <select id="categorie" name="categorie">
              <option value="Maison">Maison</option>
              <option value="Véhicule">Véhicule</option>
              <option value="Mode">Mode</option>
              <option value="Multimédia">Multimédia</option>
              <option value="Loisirs">Loisirs</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="ville">Ville</label>
          <input type="text" id="ville" name="ville" placeholder="Alger" required />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Décris ton article en quelques mots…"></textarea>
        </div>

        <p class="form-error" id="form-error" hidden>Merci de remplir le titre, le prix et la ville.</p>

        <button type="submit" class="btn-primary">Publier l'annonce</button>
      </form>
    </section>

    <!-- Colonne liste des annonces -->
    <section class="listing" aria-label="Annonces publiées">
      <div class="listing-head">
        <h2>Annonces</h2>
        <button type="button" class="btn-ghost" id="clear-all" hidden>Tout effacer</button>
      </div>

      <!-- Message quand il n'y a rien -->
      <div class="empty" id="empty-state">
        <p>Aucune annonce pour l'instant.</p>
        <p class="empty-hint">Publie ta première annonce à gauche.</p>
      </div>

      <!-- Les cartes seront ajoutées ici par script.js -->
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <footer class="site-footer wrap">
    <p>Projet d'entraînement — HTML · CSS · JS</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
